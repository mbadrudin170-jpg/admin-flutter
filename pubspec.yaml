name: admin_wifi
description: "Aplikasi untuk mengelola pelanggan Wifi."
publish_to: 'none'

version: 1.0.9+3

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  intl: ^0.20.2
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  path: ^1.9.1
  uuid: ^4.5.3
  firebase_core: ^4.5.0
  cloud_firestore: ^6.3.0
  shared_preferences: ^2.5.5
  package_info_plus: ^9.0.1
  flutter_local_notifications: ^20.1.0
  timezone: ^0.10.1
  connectivity_plus: ^7.1.1
  url_launcher: ^6.3.2
  font_awesome_flutter: ^11.0.0
  jiffy: ^6.4.4
  device_info_plus: ^12.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  dependency_validator: ^5.0.5

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/

  fonts:
    - family: Oswald
      fonts:
        - asset: assets/fonts/Oswald.ttf
          weight: 400
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
        - asset: assets/fonts/Roboto-Medium.ttf
          weight: 500
    - family: Open Sans
      fonts:
        - asset: assets/fonts/OpenSans.ttf
